<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios - Laboratorio</title>
    <link rel="stylesheet" href="css/estilo.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 340px; }
        .select-group { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background: white; font-size: 14px; }
        .regreso-link { display: block; margin-top: 15px; font-size: 14px; text-decoration: none; color: #0056b3; text-align: center; }
        .regreso-link:hover { text-decoration: underline; }
        .alert-error { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px; text-align: center; }
        .alert-exito { color: #155724; background-color: #d4edda; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Registrar Nuevo Usuario</h2>
        
        <div id="contenedor-alerta"></div>

        <form action="../backend/registrar_usuario.php" method="POST">
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan Pérez">
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required placeholder="correo@laboratorio.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres">
            </div>
            <div class="form-group">
                <label for="rol">Rol en el Sistema:</label>
                <select id="rol" name="rol" class="select-group" required>
                    <option value="usuario">Usuario (Alumno / Profesor)</option>
                    <option value="tecnico">Técnico de Laboratorio</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">Guardar Usuario</button>
        </form>
        
        <a href="../index.php" class="regreso-link">← Volver al Login</a>
    </div>

    <script>
        // Captura segura de los parámetros de respuesta de PHP sin document.write
        const urlParams = new URLSearchParams(window.location.search);
        const divAlerta = document.getElementById('contenedor-alerta');
        
        if (urlParams.has('error')) {
            divAlerta.className = 'alert-error';
            divAlerta.textContent = decodeURIComponent(urlParams.get('error'));
        }
        if (urlParams.has('exito')) {
            divAlerta.className = 'alert-exito';
            divAlerta.textContent = decodeURIComponent(urlParams.get('exito'));
        }
    </script>
</body>
</html>
